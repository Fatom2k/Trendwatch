version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Elasticsearch — stockage des tendances (single-node, mode test)
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: trendwatch_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false      # simplifié pour environnement test/dev
      - ES_JAVA_OPTS=-Xms512m -Xmx512m    # plafond mémoire pour VPS 4 GB
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"             # exposé uniquement en local
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cat/health | grep -qE 'green|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # TrendWatch agent — scheduler de veille automatique
  # ---------------------------------------------------------------------------
  trendwatch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendwatch_agent
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./output/reports:/app/output/reports
    environment:
      - PYTHONUNBUFFERED=1
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - SCHEDULE_CADENCE=${SCHEDULE_CADENCE:-daily}
      - SCHEDULE_TIME=${SCHEDULE_TIME:-08:00}
      - TIMEZONE=${TIMEZONE:-UTC}
    command: ["python", "-m", "agent.scheduler"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Interface web — FastAPI + Auth0 Google OAuth
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendwatch_web
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
    command: ["uvicorn", "web.app:app", "--host", "0.0.0.0", "--port", "8000"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Caddy — reverse proxy HTTPS avec Let's Encrypt automatique
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: trendwatch_caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"       # requis par Let's Encrypt (challenge HTTP-01)
      - "443:443"     # HTTPS
      - "443:443/udp" # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    environment:
      - DOMAIN=${DOMAIN}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  esdata:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  caddy_logs:
    driver: local
