version: "3.9"

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: trendwatch_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false      # simplified for test/dev environment
      - ES_JAVA_OPTS=-Xms512m -Xmx512m    # memory cap for 4 GB VPS
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cat/health | grep -qE 'green|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  trendwatch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendwatch_agent
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      # Persist generated reports on the host
      - ./output/reports:/app/output/reports
    environment:
      - PYTHONUNBUFFERED=1
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - SCHEDULE_CADENCE=${SCHEDULE_CADENCE:-daily}
      - SCHEDULE_TIME=${SCHEDULE_TIME:-08:00}
      - TIMEZONE=${TIMEZONE:-UTC}
    command: ["python", "-m", "agent.scheduler"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  esdata:
    driver: local
